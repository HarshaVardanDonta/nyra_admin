name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Remove node_modules before upload
        run: rm -rf node_modules

      - name: Validate required secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PASSPHRASE: ${{ secrets.VPS_SSH_PASSPHRASE }}
        run: |
          set -eu
          [ -n "$VPS_HOST" ] || (echo "Missing secret: VPS_HOST" && exit 1)
          [ -n "$VPS_PORT" ] || (echo "Missing secret: VPS_PORT" && exit 1)
          [ -n "$VPS_USER" ] || (echo "Missing secret: VPS_USER" && exit 1)
          [ -n "$VPS_SSH_KEY" ] || (echo "Missing secret: VPS_SSH_KEY" && exit 1)
          [ -n "$VPS_SSH_PASSPHRASE" ] || (echo "Missing secret: VPS_SSH_PASSPHRASE" && exit 1)

      - name: Upload code to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT }}
          source: "."
          target: "/opt/nyra_admin"
          overwrite: true
          strip_components: 0
          rm: false

      - name: Run remote deploy script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -eu
            cd /opt/nyra_admin
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh /opt/nyra_admin docker-compose.yml
