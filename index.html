<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Theme storage key must match THEME_STORAGE_KEY in src/contexts/theme-context.ts -->
    <script>
      try {
        var k = 'nyra-admin-theme'
        var t = localStorage.getItem(k)
        document.documentElement.setAttribute(
          'data-theme',
          t === 'light' || t === 'dark' ? t : 'dark',
        )
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark')
      }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nyra Admin</title>
    <meta
      name="description"
      content="Nyra merchant console for catalog, orders, coupons, and store operations."
    />
    <meta name="application-name" content="Nyra Admin" />
    <meta name="theme-color" content="#863bff" />
    <meta name="robots" content="noindex, nofollow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nyra Admin" />
    <meta
      property="og:description"
      content="Nyra merchant console for catalog, orders, coupons, and store operations."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Nyra Admin" />
    <meta
      name="twitter:description"
      content="Nyra merchant console for catalog, orders, coupons, and store operations."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
